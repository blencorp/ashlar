name: Publish

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "publish" to publish versioned packages to npm.
        required: true

permissions:
  contents: read
  id-token: write

concurrency: publish-${{ github.ref }}

jobs:
  npm:
    if: github.repository == 'blencorp/ashlar' && inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm release:smoke
      - run: node packages/cli/dist/index.js release provenance-check
      - run: node packages/cli/dist/index.js release readiness --registry ./registry --min-stable-markup-primitives 0 --allow-unverified-public --allow-local-signatures
      - run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - run: node packages/cli/dist/index.js release provenance-verify-public
      - run: mkdir -p reports && node packages/cli/dist/index.js release provenance-verify-public --json > reports/ashlar-npm-provenance.json

      - uses: actions/upload-artifact@v4
        with:
          name: ashlar-npm-provenance
          path: reports/ashlar-npm-provenance.json
