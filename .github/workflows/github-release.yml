name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "release" to create the GitHub release for the current package version.
        required: true
      version:
        description: Optional version without a leading v. Defaults to packages/ashlar/package.json.
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency: github-release-${{ github.ref }}

jobs:
  release:
    if: github.repository == 'blencorp/ashlar' && github.ref == 'refs/heads/main' && inputs.confirm == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve release version
        id: version
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="$(node -p "require('./packages/ashlar/package.json').version")"
          fi
          case "$version" in
            v*) echo "Use a version without a leading v." >&2; exit 1 ;;
            "") echo "Version is required." >&2; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify npm packages are published
        run: |
          version="${{ steps.version.outputs.version }}"
          test "$(npm view @blen/ashlar version --registry https://registry.npmjs.org)" = "$version"
          test "$(npm view @blen/ashlar-cli version --registry https://registry.npmjs.org)" = "$version"
          node -e "const root=require('./packages/schemas/package.json').version; if (!root) process.exit(1)"
          test "$(npm view @blen/ashlar-schemas version --registry https://registry.npmjs.org)" = "$(node -p "require('./packages/schemas/package.json').version")"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists."
            exit 0
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Ashlar $tag" \
            --generate-notes
