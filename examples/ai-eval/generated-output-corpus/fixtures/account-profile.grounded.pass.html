<!doctype html>
<html lang="en">
  <head>
    <title>Update your public benefits account profile | Example Agency</title>
    <meta
      name="description"
      content="Update contact information, communication preferences, and consent settings for a public benefits account."
    />
  </head>
  <body>
    <section class="ashlar-banner" aria-label="Official website of the United States government">
      An official website of the United States government
    </section>
    <main>
      <h1>Update your account profile</h1>
      <form action="/account/profile" method="post">
        <div class="ashlar-form-field">
          <label for="email">Email address</label>
          <input class="ashlar-text-input" id="email" name="email" type="email" autocomplete="email" />
        </div>
        <div class="ashlar-form-field">
          <label for="mailing-address">Mailing address</label>
          <textarea class="ashlar-textarea" id="mailing-address" name="mailing-address"></textarea>
        </div>
        <label>
          <input class="ashlar-checkbox" type="checkbox" id="paperless" name="paperless" />
          Send notices electronically when possible.
        </label>
        <button class="ashlar-button" type="submit">Save profile</button>
      </form>
    </main>
    <footer class="ashlar-identifier" aria-label="Agency identifier">
      <a href="/about">About</a>
      <a href="/accessibility">Accessibility</a>
      <a href="/foia">FOIA</a>
      <a href="/no-fear-act">No FEAR Act</a>
      <a href="/oig">Office of Inspector General</a>
      <a href="/performance">Performance reports</a>
      <a href="/privacy">Privacy</a>
    </footer>
  </body>
</html>
