<!doctype html>
<html lang="en">
  <head>
    <title>Fix your application errors</title>
    <meta
      name="description"
      content="Fix problems in your public-service application and submit the form again."
    />
  </head>
  <body>
    <main>
      <h1>Something went wrong</h1>
      <div class="ashlar-alert"></div>
      <section class="ashlar-error-summary">
        <h2>Errors</h2>
        <a href="#">Email is required</a>
      </section>
      <input class="ashlar-text-input" name="email" aria-invalid="true">
      <button class="ashlar-button" type="button"><svg aria-hidden="true"></svg></button>
    </main>
  </body>
</html>
