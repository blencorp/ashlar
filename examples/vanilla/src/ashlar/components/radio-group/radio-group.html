<fieldset class="ashlar-radio-group" aria-describedby="contact-method-hint">
  <legend class="ashlar-radio-group__legend">Preferred contact method</legend>
  <p class="ashlar-radio-group__hint" id="contact-method-hint">Choose one option.</p>
  <div class="ashlar-radio-option">
    <input class="ashlar-radio" id="contact-email" name="contact-method" type="radio" value="email">
    <label class="ashlar-radio-label" for="contact-email">Email</label>
  </div>
  <div class="ashlar-radio-option">
    <input class="ashlar-radio" id="contact-phone" name="contact-method" type="radio" value="phone">
    <label class="ashlar-radio-label" for="contact-phone">Phone</label>
  </div>
</fieldset>
