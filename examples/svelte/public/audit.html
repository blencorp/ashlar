<!doctype html>
<html lang="en" data-ashlar-theme="default" data-ashlar-mode="system">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashlar Svelte Audit Fixture | Benefits intake</title>
    <meta
      name="description"
      content="Rendered audit fixture for the Svelte Ashlar example, including federal banner, identifier links, and Button capsule markup."
    >
  </head>
  <body>
    <section class="ashlar-banner" aria-label="Official website of the United States government">
      <p>Official website of an example federal agency.</p>
    </section>
    <main>
      <h1>Check eligibility for nutrition assistance</h1>
      <button class="ashlar-button" data-variant="primary" type="button">Continue application</button>
    </main>
    <footer class="ashlar-identifier" aria-label="Agency identifier">
      <a href="/about">About this example agency</a>
      <a href="/accessibility">Accessibility statement</a>
      <a href="/foia">FOIA requests</a>
      <a href="/no-fear-act">No FEAR Act data</a>
      <a href="/inspector-general">Office of Inspector General</a>
      <a href="/performance">Performance reports</a>
      <a href="/privacy">Privacy policy</a>
    </footer>
  </body>
</html>
